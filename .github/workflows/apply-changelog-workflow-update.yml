name: Apply changelog workflow update

on:
  push:
    branches:
      - migrate-release-notes-to-changelog

permissions:
  contents: write

jobs:
  update:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out migration branch
        uses: actions/checkout@v4
        with:
          ref: migrate-release-notes-to-changelog
          fetch-depth: 0

      - name: Patch release and CI workflows
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          release_path = Path('.github/workflows/android-release.yml')
          release = release_path.read_text()

          old_metadata = '''          RELEASE_TAG="v${VERSION}"
          RELEASE_NOTES="RELEASE_NOTES_${VERSION}.md"
'''
          new_metadata = '''          RELEASE_TAG="v${VERSION}"
          CHANGELOG="CHANGELOG.md"
          RELEASE_NOTES="$RUNNER_TEMP/release-notes-${VERSION}.md"
'''
          if release.count(old_metadata) != 1:
              raise SystemExit('release metadata block mismatch')
          release = release.replace(old_metadata, new_metadata, 1)

          old_validation = '''          test -f "$RELEASE_NOTES"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: Verify signing secrets
'''
          new_validation = '''          test -f "$CHANGELOG"
          echo "VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "BUILD_NUMBER=$BUILD_NUMBER" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$RELEASE_TAG" >> "$GITHUB_ENV"
          echo "CHANGELOG=$CHANGELOG" >> "$GITHUB_ENV"
          echo "RELEASE_NOTES=$RELEASE_NOTES" >> "$GITHUB_ENV"

      - name: Extract release notes from changelog
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PYTHON'
          import os
          import re
          from pathlib import Path

          version = os.environ['VERSION']
          lines = Path(os.environ['CHANGELOG']).read_text(encoding='utf-8').splitlines()
          heading = re.compile(r'^## \\[([^]]+)\\](?: - \\d{4}-\\d{2}-\\d{2})?$')

          start = None
          for index, line in enumerate(lines):
              match = heading.fullmatch(line.strip())
              if match and match.group(1) == version:
                  start = index + 1
                  break

          if start is None:
              raise SystemExit(f'CHANGELOG.md has no section for version {version}')

          end = len(lines)
          for index in range(start, len(lines)):
              if heading.fullmatch(lines[index].strip()):
                  end = index
                  break

          notes = '\\n'.join(lines[start:end]).strip()
          if not notes or notes == 'No notable changes yet.':
              raise SystemExit(f'CHANGELOG.md section {version} is empty')

          Path(os.environ['RELEASE_NOTES']).write_text(notes + '\\n', encoding='utf-8')
          print(f'Extracted release notes for {version}')
          PYTHON

      - name: Verify signing secrets
'''
          if release.count(old_validation) != 1:
              raise SystemExit('release validation block mismatch')
          release = release.replace(old_validation, new_validation, 1)

          if release.count('          generate_release_notes: true\n') != 1:
              raise SystemExit('release notes generation setting mismatch')
          release = release.replace(
              '          generate_release_notes: true\n',
              '          generate_release_notes: false\n',
              1,
          )
          release_path.write_text(release)

          ci_path = Path('.github/workflows/flutter-ci.yml')
          ci = ci_path.read_text()
          old_checkout = '''      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
'''
          new_checkout = '''      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate changelog release section
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PYTHON'
          import re
          from pathlib import Path

          app_version = next(
              line.split(':', 1)[1].strip()
              for line in Path('pubspec.yaml').read_text(encoding='utf-8').splitlines()
              if line.startswith('version:')
          )
          version = app_version.split('+', 1)[0]
          lines = Path('CHANGELOG.md').read_text(encoding='utf-8').splitlines()
          heading = re.compile(r'^## \\[([^]]+)\\](?: - \\d{4}-\\d{2}-\\d{2})?$')

          headings = [
              match.group(1)
              for line in lines
              if (match := heading.fullmatch(line.strip()))
          ]
          if 'Unreleased' not in headings:
              raise SystemExit('CHANGELOG.md is missing the [Unreleased] section')
          if len(headings) != len(set(headings)):
              raise SystemExit('CHANGELOG.md contains duplicate version headings')

          start = None
          for index, line in enumerate(lines):
              match = heading.fullmatch(line.strip())
              if match and match.group(1) == version:
                  start = index + 1
                  break
          if start is None:
              raise SystemExit(f'CHANGELOG.md has no section for version {version}')

          end = len(lines)
          for index in range(start, len(lines)):
              if heading.fullmatch(lines[index].strip()):
                  end = index
                  break
          notes = '\\n'.join(lines[start:end]).strip()
          if not notes or notes == 'No notable changes yet.':
              raise SystemExit(f'CHANGELOG.md section {version} is empty')

          print(f'Validated CHANGELOG.md section for {version}')
          PYTHON

      - name: Set up Java 17
'''
          if ci.count(old_checkout) != 1:
              raise SystemExit('Flutter CI checkout block mismatch')
          ci_path.write_text(ci.replace(old_checkout, new_checkout, 1))
          PY

          rm RELEASE_NOTES_1.7.2.md RELEASE_NOTES_1.7.3.md RELEASE_NOTES_1.7.4.md

      - name: Commit changes and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-changelog-workflow-update.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add .github/workflows/android-release.yml .github/workflows/flutter-ci.yml RELEASE_NOTES_1.7.2.md RELEASE_NOTES_1.7.3.md RELEASE_NOTES_1.7.4.md .github/workflows/apply-changelog-workflow-update.yml
          git commit -m 'Use changelog for release notes'
          git push origin HEAD:migrate-release-notes-to-changelog
