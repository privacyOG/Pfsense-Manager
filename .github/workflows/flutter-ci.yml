name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'upgrade/**'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-warning-patch:
    if: github.event_name == 'pull_request' && github.head_ref == 'feature/dashboard-warning-actions'
    name: Apply warning integration patch
    runs-on: ubuntu-latest
    steps:
      - name: Check out feature branch
        uses: actions/checkout@v4
        with:
          ref: feature/dashboard-warning-actions
          fetch-depth: 0

      - name: Apply patch and restore CI workflow
        shell: bash
        run: |
          set -euo pipefail
          python3 tool/apply_warning_patch.py
          git checkout origin/main -- .github/workflows/flutter-ci.yml

      - name: Commit integrated warning controls
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Add warning actions and remove temporary files"
          git push origin HEAD:feature/dashboard-warning-actions

  validate:
    name: Analyze, test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze changed Dart files
        run: |
          dart analyze lib/screens/home_shell.dart
          dart analyze lib/providers/session_provider.dart
          dart analyze test/home_shell_navigation_test.dart

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee flutter-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log-${{ github.sha }}
          path: flutter-build.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pfsense-manager-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
