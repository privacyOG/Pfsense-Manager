name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'upgrade/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Analyze, test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate changelog release section
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          import re
          from pathlib import Path

          app_version = next(
              line.split(':', 1)[1].strip()
              for line in Path('pubspec.yaml').read_text(encoding='utf-8').splitlines()
              if line.startswith('version:')
          )
          version = app_version.split('+', 1)[0]
          lines = Path('CHANGELOG.md').read_text(encoding='utf-8').splitlines()
          heading = re.compile(r'^## \[([^]]+)\](?: - \d{4}-\d{2}-\d{2})?$')

          headings = [
              match.group(1)
              for line in lines
              if (match := heading.fullmatch(line.strip()))
          ]
          if 'Unreleased' not in headings:
              raise SystemExit('CHANGELOG.md is missing the [Unreleased] section')
          if len(headings) != len(set(headings)):
              raise SystemExit('CHANGELOG.md contains duplicate version headings')

          start = None
          for index, line in enumerate(lines):
              match = heading.fullmatch(line.strip())
              if match and match.group(1) == version:
                  start = index + 1
                  break
          if start is None:
              raise SystemExit(f'CHANGELOG.md has no section for version {version}')

          end = len(lines)
          for index in range(start, len(lines)):
              if heading.fullmatch(lines[index].strip()):
                  end = index
                  break
          notes = '\n'.join(lines[start:end]).strip()
          if not notes or notes == 'No notable changes yet.':
              raise SystemExit(f'CHANGELOG.md section {version} is empty')

          print(f'Validated CHANGELOG.md section for {version}')
          PY

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze changed Dart files
        shell: bash
        run: |
          set -o pipefail
          {
            dart analyze lib/main.dart
            dart analyze lib/widgets/app_lock_gate.dart
            dart analyze lib/screens/lock_screen.dart
            dart analyze lib/providers/app_settings_provider.dart
            dart analyze lib/providers/session_provider.dart
            dart analyze test/app_lock_gate_test.dart
            dart analyze lib/screens/home_shell.dart
            dart analyze test/home_shell_navigation_test.dart
          } 2>&1 | tee dart-analyze.log

      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: dart-analyze-${{ github.sha }}
          path: dart-analyze.log
          if-no-files-found: error
          retention-days: 14

      - name: Run tests
        run: flutter test --coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee flutter-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log-${{ github.sha }}
          path: flutter-build.log
          if-no-files-found: error
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pfsense-manager-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
