name: Flutter CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main
      - 'upgrade/**'
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: flutter-ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Analyze, test and build debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 35

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Test release metadata validator
        run: python3 tools/test_validate_release_metadata.py

      - name: Validate release metadata
        run: python3 tools/validate_release_metadata.py

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
          cache: gradle

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Show tool versions
        run: |
          flutter --version
          java -version

      - name: Install dependencies
        run: flutter pub get

      - name: Analyze full Flutter project
        shell: bash
        run: |
          set -o pipefail
          flutter analyze --fatal-warnings --no-fatal-infos 2>&1 | tee flutter-analyze.log

      - name: Upload analyzer log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-analyze-${{ github.sha }}
          path: flutter-analyze.log
          if-no-files-found: error
          retention-days: 14

      - name: Run tests
        shell: bash
        run: |
          set -o pipefail
          flutter test --coverage 2>&1 | tee flutter-test.log

      - name: Upload test log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-test-${{ github.sha }}
          path: flutter-test.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-${{ github.sha }}
          path: coverage/lcov.info
          if-no-files-found: error
          retention-days: 14

      - name: Build debug APK
        shell: bash
        run: |
          set -o pipefail
          flutter build apk --debug 2>&1 | tee flutter-build.log

      - name: Upload build log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flutter-build-log-${{ github.sha }}
          path: flutter-build.log
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload debug APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: pfsense-manager-debug-${{ github.sha }}
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error
          retention-days: 14
