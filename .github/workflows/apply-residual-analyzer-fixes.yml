name: Apply residual analyzer fixes

on:
  push:
    branches:
      - fix-residual-analyzer-lints

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix-residual-analyzer-lints
          fetch-depth: 0

      - name: Apply focused Dart fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          home_path = Path('lib/screens/home_shell.dart')
          home = home_path.read_text()
          old = '        child: const _MoreSection(),'
          new = '        child: _MoreSection(),'
          if home.count(old) != 1:
              raise SystemExit(f'home_shell.dart: expected one redundant const, found {home.count(old)}')
          home_path.write_text(home.replace(old, new, 1))

          dashboard_path = Path('lib/screens/dashboard_screen.dart')
          dashboard = dashboard_path.read_text()
          extension = "\nextension _FirstOrNull<T> on Iterable<T> {\n  T? get firstOrNull => isEmpty ? null : first;\n}\n"
          if dashboard.count(extension) != 1:
              raise SystemExit(
                  f'dashboard_screen.dart: expected one unused extension, found {dashboard.count(extension)}'
              )
          dashboard_path.write_text(dashboard.replace(extension, '\n', 1))
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Format changed Dart files
        run: dart format lib/screens/home_shell.dart lib/screens/dashboard_screen.dart

      - name: Commit fixes and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-residual-analyzer-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/screens/home_shell.dart lib/screens/dashboard_screen.dart .github/workflows/apply-residual-analyzer-fixes.yml
          git commit -m 'Fix residual release analyzer lints'
          git push origin HEAD:fix-residual-analyzer-lints
