name: VPN Dart format

on:
  push:
    branches:
      - feature/140-vpn-configuration-management

permissions:
  contents: write

jobs:
  format:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: feature/140-vpn-configuration-management
          fetch-depth: 0

      - name: Set up Dart
        uses: dart-lang/setup-dart@v1

      - name: Format changed Dart files
        shell: bash
        run: |
          dart format \
            lib/screens/vpn_management_screen.dart \
            lib/utils/vpn_management_validation.dart \
            test/vpn_management_model_test.dart \
            test/vpn_management_validation_test.dart
          rm .github/workflows/vpn-dart-format.yml

      - name: Commit formatting
        shell: bash
        run: |
          git config user.name "privacyOG"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add lib/screens/vpn_management_screen.dart \
            lib/utils/vpn_management_validation.dart \
            test/vpn_management_model_test.dart \
            test/vpn_management_validation_test.dart \
            .github/workflows/vpn-dart-format.yml
          if git diff --cached --quiet; then
            exit 0
          fi
          git commit -m "Format VPN hardening changes"
          git push origin HEAD:feature/140-vpn-configuration-management
