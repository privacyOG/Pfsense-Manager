name: Apply analyzer fixes

on:
  push:
    branches:
      - fix-analyzer-warnings

permissions:
  contents: write

jobs:
  patch:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Check out branch
        uses: actions/checkout@v4
        with:
          ref: fix-analyzer-warnings
          fetch-depth: 0

      - name: Apply focused Dart fixes
        shell: bash
        run: |
          set -euo pipefail
          python3 <<'PY'
          from pathlib import Path

          def replace_once(text: str, old: str, new: str, label: str) -> str:
              count = text.count(old)
              if count != 1:
                  raise SystemExit(f'{label}: expected one match, found {count}')
              return text.replace(old, new, 1)

          dashboard_path = Path('lib/screens/dashboard_screen.dart')
          dashboard = dashboard_path.read_text()

          dashboard = replace_once(
              dashboard,
              "      if (newIndex > oldIndex) newIndex--;\n      final item = _cardOrder.removeAt(oldIndex);",
              "      final item = _cardOrder.removeAt(oldIndex);",
              'adjusted reorder index',
          )
          dashboard = replace_once(
              dashboard,
              '                        onReorder: reorder,',
              '                        onReorderItem: reorder,',
              'reorder callback',
          )
          dashboard = replace_once(
              dashboard,
              "            _SectionHeader(\n              icon: Icons.speed,\n              title: 'Health gauges',\n              action: 'Long-press to arrange',",
              "            const _SectionHeader(\n              icon: Icons.speed,\n              title: 'Health gauges',\n              action: 'Long-press to arrange',",
              'health header const',
          )
          dashboard = replace_once(
              dashboard,
              "            _SectionHeader(\n              icon: Icons.device_thermostat,\n              title: 'System load and thermal',\n              action: 'Long-press to arrange',",
              "            const _SectionHeader(\n              icon: Icons.device_thermostat,\n              title: 'System load and thermal',\n              action: 'Long-press to arrange',",
              'system header const',
          )

          start_marker = 'class _AlertStrip extends StatelessWidget {'
          end_marker = 'class _ResponsiveGrid extends StatelessWidget {'
          start = dashboard.find(start_marker)
          end = dashboard.find(end_marker)
          if start < 0 or end < 0 or end <= start:
              raise SystemExit('legacy alert implementation markers not found')
          dashboard = dashboard[:start] + dashboard[end:]

          if '.withOpacity(' not in dashboard:
              raise SystemExit('expected deprecated withOpacity calls')
          dashboard = dashboard.replace('.withOpacity(', '.withValues(alpha: ')
          dashboard_path.write_text(dashboard)

          home_path = Path('lib/screens/home_shell.dart')
          home = home_path.read_text()
          home = replace_once(
              home,
              "      _PrimaryDestination(\n        label: 'More',",
              "      const _PrimaryDestination(\n        label: 'More',",
              'More destination const',
          )
          home_path.write_text(home)
          PY

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.44.2'
          channel: stable
          cache: true

      - name: Format changed Dart files
        run: dart format lib/screens/home_shell.dart lib/screens/dashboard_screen.dart

      - name: Commit source fixes and remove one-time workflow
        shell: bash
        run: |
          set -euo pipefail
          rm .github/workflows/apply-analyzer-fixes.yml
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add lib/screens/home_shell.dart lib/screens/dashboard_screen.dart .github/workflows/apply-analyzer-fixes.yml
          git commit -m 'Fix release analyzer diagnostics'
          git push origin HEAD:fix-analyzer-warnings
