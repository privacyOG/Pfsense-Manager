name: pfsense_manager
description: A versatile mobile application for managing multiple pfSense instances.
publish_to: 'none'
version: 1.7.4+13

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # State management
  provider: ^6.1.1

  # Networking
  dio: ^5.4.0
  http_parser: ^4.0.2

  # Storage
  shared_preferences: ^2.2.2
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1

  # UI
  flutter_slidable: ^3.1.0
  pull_to_refresh: ^2.0.0
  connectivity_plus: ^6.0.3
  device_info_plus: ^10.0.1
  package_info_plus: ^8.0.0
  local_auth: ^2.2.0

  # Security & Auth
  crypto: ^3.0.7
  flutter_secure_storage: ^9.0.0
  pin_code_fields: ^8.0.1

  # File handling
  file_picker: ^8.0.0
  share_plus: ^9.0.0

  # Charts
  fl_chart: ^0.68.0

  # Material You dynamic theming
  dynamic_color: ^1.7.0

  # Android home screen widgets
  home_widget: ^0.6.0

  # Utilities
  intl: ^0.20.2
  uuid: ^4.3.0
  collection: ^1.18.0
  json_annotation: ^4.9.0
  url_launcher: ^6.2.5
  timer_count_down: ^2.2.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.7
  json_serializable: ^6.8.0

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/images/
    - assets/icons/
